<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>EnglishAI Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 3C6.5 3 2 6.58 2 11a7.77 7.77 0 0 0 3.28 6.18L4 21l3.97-1.98A11 11 0 0 0 12 19c5.5 0 10-3.58 10-8s-4.5-8-10-8z" fill="currentColor"/>
        </svg>
        <span>EnglishAI Chat</span>
      </div>
    </header>

    <nav class="tab-nav">
      <a href="#/chat"    class="tab-link" data-view="chat">💬 <span class="tab-text">Chat</span></a>
      <a href="#/stats"   class="tab-link" data-view="stats">📊 <span class="tab-text">Stats</span></a>
      <a href="#/history" class="tab-link" data-view="history">📝 <span class="tab-text">History</span></a>
      <a href="#/profile" class="tab-link" data-view="profile">👤 <span class="tab-text">Profile</span></a>
    </nav>

    <!-- ── Chat View ─────────────────────────────────────────────── -->
    <section class="view" id="view-chat">
      <div class="goal-bar">
        <div class="goal-info">
          <span id="goalLabel" class="goal-label-text">Today: 0 / 10 turns</span>
          <button id="clearBtn" class="btn-clear">초기화</button>
        </div>
        <div class="goal-track"><div class="goal-fill" id="goalFill"></div></div>
      </div>
      <div class="body">
        <main id="chatContainer" class="chat" role="log" aria-live="polite" aria-label="Conversation"></main>
        <aside class="feedback-panel" id="feedbackPanel" aria-label="Grammar feedback">
          <div class="feedback-header">
            <span class="feedback-title">📝 Feedback</span>
            <button id="feedbackToggleBtn" class="btn-feedback-toggle" aria-expanded="true">▾</button>
          </div>
          <div class="feedback-content" id="feedbackContent">
            <div class="feedback-placeholder">Send a message to get feedback on your English.</div>
          </div>
        </aside>
      </div>
    </section>

    <!-- ── Stats View ─────────────────────────────────────────────── -->
    <section class="view" id="view-stats">
      <div class="page-scroll" id="statsContent"></div>
    </section>

    <!-- ── History View ───────────────────────────────────────────── -->
    <section class="view" id="view-history">
      <div class="page-scroll" id="historyContent"></div>
    </section>

    <!-- ── Profile View ───────────────────────────────────────────── -->
    <section class="view" id="view-profile">
      <div class="page-scroll">
        <div class="page-wrap">
          <h2 class="page-title">👤 Profile</h2>
          <div id="profileWelcome" class="profile-welcome hidden">
            <p>Welcome! Set up your profile to personalize your learning experience.</p>
          </div>

          <div class="form-section">
            <label class="form-label" for="profileName">Nickname</label>
            <input type="text" id="profileName" class="form-input" placeholder="Your name" maxlength="30">
          </div>

          <div class="form-section">
            <div class="form-label">English Level</div>
            <div class="radio-group">
              <label class="radio-opt"><input type="radio" name="level" value="beginner"> Beginner</label>
              <label class="radio-opt"><input type="radio" name="level" value="intermediate" checked> Intermediate</label>
              <label class="radio-opt"><input type="radio" name="level" value="advanced"> Advanced</label>
            </div>
          </div>

          <div class="form-section">
            <div class="form-label">Learning Goals <span class="form-hint">(select all that apply)</span></div>
            <div class="checkbox-group">
              <label class="check-opt"><input type="checkbox" name="goals" value="daily" checked> 일상 회화</label>
              <label class="check-opt"><input type="checkbox" name="goals" value="business"> 비즈니스 영어</label>
              <label class="check-opt"><input type="checkbox" name="goals" value="travel"> 여행</label>
              <label class="check-opt"><input type="checkbox" name="goals" value="exam"> 시험 준비</label>
            </div>
          </div>

          <div class="form-section">
            <div class="form-label">Daily Turn Target</div>
            <div class="radio-group">
              <label class="radio-opt"><input type="radio" name="target" value="5"> 5 turns</label>
              <label class="radio-opt"><input type="radio" name="target" value="10" checked> 10 turns</label>
              <label class="radio-opt"><input type="radio" name="target" value="20"> 20 turns</label>
              <label class="radio-opt"><input type="radio" name="target" value="30"> 30 turns</label>
            </div>
          </div>

          <button id="saveProfileBtn" class="btn-primary">Save Profile</button>

          <hr class="form-divider">

          <div class="form-section">
            <div class="form-label danger-label">⚠ Danger Zone</div>
            <button id="clearAllDataBtn" class="btn-danger">🗑 모든 데이터 삭제</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Footer (chat view only) ────────────────────────────────── -->
    <footer class="footer">
      <div class="tts-bar">
        <select id="voiceSelect" class="voice-select" aria-label="Voice">
          <option value="">Loading voices…</option>
        </select>
        <label class="slider-label">
          <span class="slider-name">Speed</span>
          <input type="range" id="rateSlider" min="0.7" max="1.3" step="0.05" value="1">
          <span id="rateVal" class="slider-val">1.0×</span>
        </label>
        <label class="slider-label">
          <span class="slider-name">Pitch</span>
          <input type="range" id="pitchSlider" min="0.8" max="1.2" step="0.05" value="1">
          <span id="pitchVal" class="slider-val">1.0</span>
        </label>
        <div class="tts-btns">
          <button id="pauseBtn"   class="btn-tts" title="Pause/Resume" disabled>⏸</button>
          <button id="stopTTSBtn" class="btn-tts" title="Stop"         disabled>⏹</button>
          <button id="autoPlayBtn" class="btn-autoplay active" aria-pressed="true">🔊 Auto ON</button>
        </div>
      </div>
      <div class="input-row">
        <textarea id="userInput" class="input-text"
          placeholder="Type in English or tap 🎤 to speak…"
          rows="1" autocomplete="off" spellcheck="true"
          aria-label="Your message"></textarea>
        <button id="micBtn" class="btn-mic" aria-label="Start voice input" title="Voice input (Chrome/Edge)">
          <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
          <svg id="stopIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>
        <button id="sendBtn" class="btn-send" aria-label="Send message">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
